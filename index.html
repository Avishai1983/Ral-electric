<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;direction:rtl;background:#0f1117;color:#e8eaf0;min-height:100vh}
  .hdr{background:linear-gradient(135deg,#1a1f2e,#252d40);border-bottom:2px solid #f59e0b;padding:1.2rem 1rem;text-align:center}
  .hdr-logo-img{height:64px;object-fit:contain;margin-bottom:.3rem;background:#fff;border-radius:8px;padding:6px 12px}
  .hdr-sub{font-size:.85rem;color:#f59e0b;font-weight:600;letter-spacing:.5px}
  .container{max-width:600px;margin:0 auto;padding:1.5rem 1rem}
  .section-title{font-size:.75rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:1px solid #1e2a3a}
  .card{background:#1a1f2e;border:1px solid #1e2a3a;border-radius:14px;padding:1.2rem;margin-bottom:.85rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit}
  .card:hover,.card:active{border-color:#f59e0b;background:#1e2535;transform:translateY(-1px)}
  .card-icon{font-size:2rem;flex-shrink:0;width:52px;height:52px;background:#252d40;border-radius:12px;display:flex;align-items:center;justify-content:center}
  .card-body{flex:1}
  .card-title{font-size:1rem;font-weight:700;color:#e8eaf0;margin-bottom:.2rem}
  .card-desc{font-size:.78rem;color:#64748b;line-height:1.5}
  .card-arrow{color:#f59e0b;font-size:1.2rem;flex-shrink:0}
  .footer{text-align:center;padding:1.5rem 1rem .3rem;color:#374151;font-size:.75rem;line-height:1.8;border-top:1px solid #1e2a3a;margin-top:1rem}
  .footer b{color:#64748b}
  .footer a{color:#64748b}
</style>
